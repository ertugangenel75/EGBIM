<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>EGBIMOTO 4D/5D Viewer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0E0E1A;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #CCC;
    display: flex;
    flex-direction: column;
    height: 100vh;
    user-select: none;
  }

  /* ── YÜKLEME OVERLAY ─────────────────────────────────────────── */
  #loading {
    position: fixed; inset: 0;
    background: #0E0E1A;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.4s;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid #1A1A3A;
    border-top-color: #5B9BD5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ANA DÜZEN: üst bölge + alt timeline ─────────────────────── */
  #main {
    flex: 1; display: flex; overflow: hidden; min-height: 0;
  }

  /* ── 3D SAHNE ALANI ───────────────────────────────────────────── */
  #scene-area {
    flex: 1; position: relative; min-width: 0;
  }
  #scene-area canvas { display: block; width: 100% !important; height: 100% !important; }

  /* Eksen göstergesi */
  #axes-hint {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.55); border-radius: 6px;
    padding: 5px 10px; font-size: 10px; color: #666;
    pointer-events: none;
  }
  .ax { font-weight: bold; margin-right: 6px; }
  .ax-x { color:#e74c3c; } .ax-y { color:#2ecc71; } .ax-z { color:#3498db; }

  /* Hover tooltip */
  #hover-tip {
    position: absolute; display: none;
    background: rgba(10,10,25,0.92);
    border: 1px solid #2A2A5A;
    border-radius: 8px; padding: 8px 12px;
    font-size: 11px; pointer-events: none;
    max-width: 220px; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #hover-tip strong { color: #5B9BD5; display: block; margin-bottom: 4px; }
  #hover-tip span { color: #aaa; display: block; margin-top: 2px; }

  /* ── SAĞ PANEL (5D maliyet + efsane) ─────────────────────────── */
  #right-panel {
    width: 280px; background: #12122A;
    border-left: 1px solid #1A1A3A;
    display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
  }
  #right-panel.hidden { display: none; }

  .panel-section {
    padding: 12px 14px;
    border-bottom: 1px solid #1A1A3A;
  }
  .panel-title {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    color: #556; margin-bottom: 8px;
  }

  /* S-eğrisi canvas */
  #scurve-canvas {
    width: 100%; height: 100px;
    display: block;
  }

  /* Maliyet sayaçlar */
  #cost-current {
    font-size: 20px; font-weight: 700;
    color: #70AD47; margin: 4px 0 2px;
    font-variant-numeric: tabular-nums;
  }
  #cost-total {
    font-size: 11px; color: #556;
  }
  #cost-pct {
    font-size: 12px; color: #FFC000; margin-top: 2px;
  }

  /* Efsane */
  .legend-item {
    display: flex; align-items: center;
    gap: 8px; font-size: 11px; color: #aaa;
    margin-bottom: 5px;
  }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0;
  }

  /* Seçili eleman */
  #selected-info { flex: 1; overflow-y: auto; }
  #selected-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  #selected-table td { padding: 3px 4px; color: #bbb; }
  #selected-table td:first-child { color: #557; width: 80px; }
  #selected-none { font-size: 11px; color: #446; padding: 8px 0; font-style: italic; }

  /* ── ALT TIMELINE ALANI ───────────────────────────────────────── */
  #timeline-area {
    background: #0C0C20;
    border-top: 1px solid #1A1A3A;
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }

  /* Kontroller satırı */
  #timeline-controls {
    display: flex; align-items: center;
    gap: 10px; padding: 8px 14px;
    border-bottom: 1px solid #161628;
  }

  .ctl-btn {
    background: #1F1F38; border: 1px solid #2A2A4A;
    color: #CCC; border-radius: 5px;
    width: 30px; height: 30px;
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s;
  }
  .ctl-btn:hover { background: #2A2A50; }
  .ctl-btn.active { background: #1A3A50; border-color: #5B9BD5; color: #5B9BD5; }

  #timeline-slider-wrap {
    flex: 1; display: flex; align-items: center; gap: 10px;
  }
  #timeline-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px; outline: none;
    cursor: pointer;
    background: linear-gradient(to right, #5B9BD5 var(--pct,0%), #2A2A4A var(--pct,0%));
  }
  #timeline-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #5B9BD5; cursor: pointer;
    border: 2px solid #0E0E1A;
    box-shadow: 0 0 6px rgba(91,155,213,0.5);
  }
  #date-label {
    font-size: 12px; color: #5B9BD5;
    min-width: 86px; text-align: center;
    font-variant-numeric: tabular-nums;
  }
  #progress-pct {
    font-size: 11px; color: #FFC000;
    min-width: 44px; text-align: right;
  }

  /* Mini Gantt */
  #gantt-area {
    overflow-x: hidden; overflow-y: auto;
    max-height: 100px; padding: 0 14px 6px;
  }
  .gantt-row {
    display: flex; align-items: center;
    gap: 6px; height: 16px; margin-bottom: 2px;
  }
  .gantt-label {
    font-size: 9px; color: #557; min-width: 70px;
    max-width: 70px; overflow: hidden; white-space: nowrap;
    text-overflow: ellipsis;
  }
  .gantt-bar-track {
    flex: 1; background: #141428; border-radius: 2px;
    height: 8px; position: relative; overflow: visible;
  }
  .gantt-bar {
    position: absolute; height: 100%;
    border-radius: 2px; opacity: 0.75;
    transition: opacity 0.2s;
  }
  .gantt-cursor {
    position: absolute; top: -4px; width: 2px;
    height: 16px; background: #FFC000; z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Yükleniyor -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:12px;color:#446">4D/5D görünüm yükleniyor...</div>
</div>

<!-- Ana düzen -->
<div id="main">

  <!-- 3D Sahne -->
  <div id="scene-area">
    <div id="axes-hint">
      <span class="ax ax-x">X</span>
      <span class="ax ax-y">Y↑</span>
      <span class="ax ax-z">Z</span>
      &nbsp;|&nbsp; Sol: döndür &nbsp; Sağ: kaydır &nbsp; Scroll: zoom
    </div>
    <div id="hover-tip"></div>
  </div>

  <!-- Sağ panel (5D maliyet) -->
  <div id="right-panel">

    <!-- S-eğrisi -->
    <div class="panel-section">
      <div class="panel-title">📈 Kümülatif Maliyet</div>
      <canvas id="scurve-canvas"></canvas>
      <div id="cost-current">₺0</div>
      <div id="cost-total">/ ₺0 toplam</div>
      <div id="cost-pct">%0 tamamlandı</div>
    </div>

    <!-- Efsane -->
    <div class="panel-section">
      <div class="panel-title">⬤ Durum</div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#555577;"></div>
        <span>Başlamadı</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#FFA500;"></div>
        <span>Devam Ediyor</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#70AD47;"></div>
        <span>Tamamlandı</span>
      </div>
    </div>

    <!-- Seçili eleman bilgisi -->
    <div class="panel-section" id="selected-info" style="flex:1;overflow-y:auto;">
      <div class="panel-title">🔍 Seçili Eleman</div>
      <div id="selected-none">Elemana tıklayın...</div>
      <table id="selected-table" style="display:none;"></table>
    </div>

  </div>
</div>

<!-- Timeline -->
<div id="timeline-area">
  <div id="timeline-controls">
    <button class="ctl-btn" id="btn-reset"    title="Başa Al">⏮</button>
    <button class="ctl-btn" id="btn-play"     title="Oynat/Duraklat">▶</button>
    <button class="ctl-btn" id="btn-end"      title="Sona Git">⏭</button>

    <div id="timeline-slider-wrap">
      <input type="range" id="timeline-slider" min="0" max="1000" value="0" step="1">
    </div>

    <div id="date-label">—</div>
    <div id="progress-pct">%0</div>
  </div>

  <!-- Mini Gantt -->
  <div id="gantt-area"></div>
</div>

<!-- Three.js -->
<script src="three.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  EGBIMOTO 4D/5D Viewer  v1.0
//  Three.js r128  |  WebView2 köprüsü
// ═══════════════════════════════════════════════════════════════════════════════
'use strict';

// ── Durum ─────────────────────────────────────────────────────────────────────
let dto          = null;   // FourDFiveDDto
let scheduleMap  = {};     // meshId → ScheduleItem
let costMap      = {};     // meshId → CostItem5D[]
let projectStart = null;   // Date
let projectEnd   = null;   // Date
let projectDays  = 0;
let currentDate  = null;   // Date (slider pozisyonu)
let isPlaying    = false;
let playSpeed    = 1;      // gün/frame
let animRafId    = null;
let lastTimestamp = 0;
let msPerGameDay = 20;     // 20ms gerçek = 1 proje günü (speed=1)

// Three.js nesneleri
let renderer, scene, camera, previewGroup;
const meshObjects  = [];   // { three: Mesh, meshId: str }
const raycaster    = new THREE.Raycaster();
const mouse        = new THREE.Vector2();
let hoveredMesh    = null;
let selectedMeshId = null;

// Sahne başlat
function initScene() {
  const container = document.getElementById('scene-area');
  const W = container.clientWidth;
  const H = container.clientHeight;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.outputEncoding = THREE.sRGBEncoding;
  container.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0E0E1A);

  camera = new THREE.PerspectiveCamera(45, W / H, 1, 2e6);
  camera.position.set(6000, 5000, 6000);
  camera.lookAt(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(10000, 20000, 10000);
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0x334466, 0.3);
  fill.position.set(-5000, -5000, -5000);
  scene.add(fill);

  const grid = new THREE.GridHelper(60000, 60, 0x222233, 0x1A1A2A);
  scene.add(grid);

  previewGroup = new THREE.Group();
  scene.add(previewGroup);

  initOrbitControls();
  initMouseEvents();

  window.addEventListener('resize', onResize);
  renderLoop();
}

// ── Render loop ───────────────────────────────────────────────────────────────
function renderLoop(ts) {
  requestAnimationFrame(renderLoop);
  renderer.render(scene, camera);

  // Animasyon
  if (isPlaying && projectStart && projectEnd) {
    const now = performance.now();
    const elapsed = ts ? (now - lastTimestamp) : 0;
    lastTimestamp = now;

    const daysStep = (elapsed / msPerGameDay) * playSpeed;
    advanceDate(daysStep);
  }
}

// ── Ana veri yükleme ──────────────────────────────────────────────────────────
function load4D5D(data) {
  dto = data;

  // Tarih aralığı
  projectStart = parseDate(data.project_start);
  projectEnd   = parseDate(data.project_end);
  if (!projectStart) projectStart = new Date();
  if (!projectEnd)   projectEnd   = new Date(projectStart.getTime() + 270 * 86400000);
  projectDays  = daysBetween(projectStart, projectEnd);
  currentDate  = new Date(projectStart);

  // Haritalar
  scheduleMap = {};
  (data.schedule_items || []).forEach(si => { scheduleMap[si.mesh_id] = si; });
  costMap = {};
  (data.cost_items     || []).forEach(ci => {
    if (!costMap[ci.mesh_id]) costMap[ci.mesh_id] = [];
    costMap[ci.mesh_id].push(ci);
  });

  // Sağ panel
  const hasCost = (data.cost_items || []).length > 0;
  document.getElementById('right-panel').classList.toggle('hidden', !hasCost);
  if (hasCost) {
    document.getElementById('cost-total').textContent =
      '/ ' + fmtCurrency(data.total_cost, data.currency || '₺') + ' toplam';
    initSCurve(data);
  }

  // Meshler
  buildScene(data);

  // Gantt
  buildGantt(data);

  // Slider
  updateSlider();
  updateSceneForDate(currentDate);

  // Kamera
  if (data.bbox) fitCamera(data.bbox);
  else autoFit();

  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
  }, 400);
}

// ── Sahne inşa ────────────────────────────────────────────────────────────────
function buildScene(data) {
  while (previewGroup.children.length > 0)
    previewGroup.remove(previewGroup.children[0]);
  meshObjects.length = 0;

  (data.meshes || []).forEach(m => {
    if (!m.vertices || m.vertices.length === 0) return;

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position',
      new THREE.BufferAttribute(new Float32Array(m.vertices), 3));
    if (m.indices && m.indices.length > 0)
      geo.setIndex(m.indices);
    geo.computeVertexNormals();

    const mat = new THREE.MeshPhongMaterial({
      color:       new THREE.Color('#555577'),  // başlangıçta gri (başlamadı)
      opacity:     0.2,
      transparent: true,
      side:        THREE.DoubleSide,
      shininess:   25
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = { meshId: m.id, meshDef: m };
    previewGroup.add(mesh);
    meshObjects.push({ three: mesh, meshId: m.id });
  });

  (data.edges || []).forEach(e => {
    if (!e.points || e.points.length < 6) return;
    const pts = [];
    for (let i = 0; i + 2 < e.points.length; i += 3)
      pts.push(new THREE.Vector3(e.points[i], e.points[i+1], e.points[i+2]));
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({
      color: new THREE.Color(e.color || '#333355'), opacity: 0.4, transparent: true
    });
    previewGroup.add(new THREE.LineSegments(geo, mat));
  });
}

// ── Sahneyi tarihe göre güncelle ──────────────────────────────────────────────
function updateSceneForDate(date) {
  const COLOR_NOT_STARTED = 0x333355;
  const COLOR_IN_PROGRESS = 0xFF9500;
  const COLOR_DONE        = 0x55AA33;
  const OP_NOT_STARTED    = 0.18;
  const OP_IN_PROGRESS    = 0.92;
  const OP_DONE           = 0.72;

  meshObjects.forEach(({ three, meshId }) => {
    const si = scheduleMap[meshId];
    const mat = three.material;

    if (!si) {
      // Program yok — tam opasite, kategori rengi
      mat.color.set(new THREE.Color(three.userData.meshDef.color || '#4A90D9'));
      mat.opacity     = 0.6;
      mat.transparent = true;
      mat.needsUpdate = true;
      return;
    }

    const start = parseDate(si.start_date);
    const end   = parseDate(si.end_date);

    if (!start || !end) return;

    if (date < start) {
      // Başlamadı — gri, şeffaf
      mat.color.setHex(COLOR_NOT_STARTED);
      mat.opacity     = OP_NOT_STARTED;
      mat.transparent = true;
    } else if (date <= end) {
      // Devam ediyor — turuncu, parlak
      mat.color.setHex(COLOR_IN_PROGRESS);
      mat.opacity     = OP_IN_PROGRESS;
      mat.transparent = false;
    } else {
      // Tamamlandı — kategori rengi, normal opasite
      mat.color.set(new THREE.Color(si.original_color || '#4A90D9'));
      mat.opacity     = OP_DONE;
      mat.transparent = true;
    }
    mat.needsUpdate = true;
  });

  // S-eğrisi + maliyet
  updateCostDisplay(date);
}

// ── Timeline ──────────────────────────────────────────────────────────────────
function advanceDate(days) {
  if (!projectStart || !projectEnd) return;
  const newTime = currentDate.getTime() + days * 86400000;
  currentDate = new Date(Math.min(newTime, projectEnd.getTime()));
  if (currentDate >= projectEnd) stopAnimation();
  updateSlider();
  updateSceneForDate(currentDate);
}

function updateSlider() {
  const slider   = document.getElementById('timeline-slider');
  const dateLbl  = document.getElementById('date-label');
  const pctLbl   = document.getElementById('progress-pct');

  const pct = projectDays > 0
    ? daysBetween(projectStart, currentDate) / projectDays
    : 0;

  slider.value = Math.round(pct * 1000);
  slider.style.setProperty('--pct', (pct * 100).toFixed(1) + '%');
  dateLbl.textContent  = fmtDate(currentDate);
  pctLbl.textContent   = '%' + Math.round(pct * 100);

  // Gantt cursor
  document.querySelectorAll('.gantt-cursor').forEach(el => {
    el.style.left = (pct * 100).toFixed(2) + '%';
  });
}

document.getElementById('timeline-slider').addEventListener('input', function() {
  const pct    = parseInt(this.value) / 1000;
  const ms     = projectStart ? projectStart.getTime() + pct * projectDays * 86400000 : 0;
  currentDate  = new Date(ms);
  updateSlider();
  updateSceneForDate(currentDate);
});

document.getElementById('btn-play').addEventListener('click', () => {
  isPlaying ? stopAnimation() : startAnimation();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  stopAnimation();
  currentDate = new Date(projectStart);
  updateSlider();
  updateSceneForDate(currentDate);
});
document.getElementById('btn-end').addEventListener('click', () => {
  stopAnimation();
  currentDate = new Date(projectEnd);
  updateSlider();
  updateSceneForDate(currentDate);
});

function startAnimation() {
  isPlaying = true;
  lastTimestamp = performance.now();
  document.getElementById('btn-play').textContent = '⏸';
  document.getElementById('btn-play').classList.add('active');
}
function stopAnimation() {
  isPlaying = false;
  document.getElementById('btn-play').textContent = '▶';
  document.getElementById('btn-play').classList.remove('active');
}

function setSpeed(s) {
  playSpeed    = parseFloat(s) || 1;
  msPerGameDay = 20 / playSpeed;
}

// ── S-eğrisi ──────────────────────────────────────────────────────────────────
let sCurvePoints = []; // [{date, cumCost}]

function initSCurve(data) {
  if (!data.cost_items || data.cost_items.length === 0) return;

  // Her gün için kümülatif maliyet hesapla (50 nokta yeterli)
  const totalDays = projectDays;
  const steps     = Math.min(totalDays, 100);
  sCurvePoints    = [];

  for (let i = 0; i <= steps; i++) {
    const d   = new Date(projectStart.getTime() + (i / steps) * totalDays * 86400000);
    const cost = calcCostAtDate(d, data);
    sCurvePoints.push({ date: d, cost });
  }
}

function calcCostAtDate(date, data) {
  let total = 0;
  const items  = data.cost_items || [];
  const schMap = {};
  (data.schedule_items || []).forEach(si => schMap[si.mesh_id] = si);

  items.forEach(ci => {
    const si = schMap[ci.mesh_id];
    if (!si) { total += ci.toplam || 0; return; }

    const start = parseDate(si.start_date);
    const end   = parseDate(si.end_date);
    if (!start || !end) return;

    if (date > end) {
      total += ci.toplam || 0;
    } else if (date >= start) {
      const progress = (date - start) / (end - start);
      total += (ci.toplam || 0) * Math.min(1, Math.max(0, progress));
    }
  });
  return total;
}

function drawSCurve(currentCost, totalCost) {
  const canvas = document.getElementById('scurve-canvas');
  const W = canvas.offsetWidth || 252;
  const H = canvas.offsetHeight || 100;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.clearRect(0, 0, W, H);
  if (sCurvePoints.length < 2 || totalCost <= 0) return;

  const pad = { t: 8, r: 6, b: 18, l: 6 };
  const cW  = W - pad.l - pad.r;
  const cH  = H - pad.t - pad.b;

  // Grid çizgiler
  ctx.strokeStyle = '#1A1A2E'; ctx.lineWidth = 1;
  [0.25, 0.5, 0.75].forEach(p => {
    const y = pad.t + cH * (1 - p);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y);
    ctx.stroke();
  });

  // S-eğrisi — gradient
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0,   '#70AD47');
  grad.addColorStop(0.6, '#FFC000');
  grad.addColorStop(1,   '#ED7D31');

  ctx.beginPath();
  sCurvePoints.forEach((pt, i) => {
    const x = pad.l + (daysBetween(projectStart, pt.date) / projectDays) * cW;
    const y = pad.t + cH * (1 - Math.min(pt.cost / totalCost, 1));
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = grad;
  ctx.lineWidth   = 2;
  ctx.stroke();

  // Alan dolgu
  ctx.lineTo(W - pad.r, H - pad.b);
  ctx.lineTo(pad.l, H - pad.b);
  ctx.closePath();
  const fillGrad = ctx.createLinearGradient(0, 0, 0, H);
  fillGrad.addColorStop(0, 'rgba(112,173,71,0.2)');
  fillGrad.addColorStop(1, 'rgba(112,173,71,0)');
  ctx.fillStyle = fillGrad;
  ctx.fill();

  // Güncel tarih çizgisi
  const pct  = projectDays > 0 ? daysBetween(projectStart, currentDate) / projectDays : 0;
  const curX = pad.l + pct * cW;
  ctx.strokeStyle = '#FFC000'; ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 2]);
  ctx.beginPath(); ctx.moveTo(curX, pad.t); ctx.lineTo(curX, H - pad.b);
  ctx.stroke();
  ctx.setLineDash([]);

  // Güncel nokta
  const curCostPct = totalCost > 0 ? Math.min(currentCost / totalCost, 1) : 0;
  const curY = pad.t + cH * (1 - curCostPct);
  ctx.beginPath();
  ctx.arc(curX, curY, 4, 0, Math.PI * 2);
  ctx.fillStyle   = '#FFC000';
  ctx.strokeStyle = '#0E0E1A';
  ctx.lineWidth   = 2;
  ctx.fill(); ctx.stroke();
}

function updateCostDisplay(date) {
  if (!dto || !dto.cost_items || dto.cost_items.length === 0) return;
  const currency = dto.currency || '₺';
  const total    = dto.total_cost || 0;
  const current  = calcCostAtDate(date, dto);

  document.getElementById('cost-current').textContent = fmtCurrency(current, currency);
  const pct = total > 0 ? (current / total * 100).toFixed(1) : '0';
  document.getElementById('cost-pct').textContent = `%${pct} tamamlandı`;

  drawSCurve(current, total);
}

// ── Mini Gantt ────────────────────────────────────────────────────────────────
function buildGantt(data) {
  const ganttEl = document.getElementById('gantt-area');
  ganttEl.innerHTML = '';

  if (!data.schedule_items || data.schedule_items.length === 0) return;

  // Fazlara göre grupla
  const phases = {};
  data.schedule_items.forEach(si => {
    const phase = si.phase || 'Genel';
    if (!phases[phase]) phases[phase] = { start: null, end: null };
    const s = parseDate(si.start_date);
    const e = parseDate(si.end_date);
    if (s && (!phases[phase].start || s < phases[phase].start)) phases[phase].start = s;
    if (e && (!phases[phase].end   || e > phases[phase].end))   phases[phase].end   = e;
  });

  const PHASE_COLORS = {
    'betonarme': '#ED7D31', 'beton': '#ED7D31', 'döküm': '#ED7D31',
    'duvar': '#5B9BD5',     'blok':  '#5B9BD5',
    'çatı': '#9E480E',      'cati':  '#9E480E',
    'mep':  '#70AD47',      'tesisat': '#70AD47',
    'default': '#7B68EE'
  };

  Object.entries(phases).forEach(([phase, range]) => {
    if (!range.start || !range.end) return;

    const startPct = projectDays > 0
      ? Math.max(0, daysBetween(projectStart, range.start) / projectDays * 100)
      : 0;
    const widthPct = projectDays > 0
      ? Math.min(100 - startPct, daysBetween(range.start, range.end) / projectDays * 100)
      : 0;

    const phaseLower = phase.toLowerCase().replace(/[ışğçüö]/g, c =>
      ({'ı':'i','ş':'s','ğ':'g','ç':'c','ü':'u','ö':'o'}[c]||c));
    const color = PHASE_COLORS[phaseLower] || PHASE_COLORS['default'];

    const currentPct = projectDays > 0
      ? Math.max(0, Math.min(100, daysBetween(projectStart, currentDate) / projectDays * 100))
      : 0;

    const row = document.createElement('div');
    row.className = 'gantt-row';
    row.innerHTML = `
      <div class="gantt-label" title="${phase}">${phase}</div>
      <div class="gantt-bar-track">
        <div class="gantt-bar" style="left:${startPct.toFixed(2)}%;width:${widthPct.toFixed(2)}%;background:${color};"></div>
        <div class="gantt-cursor" style="left:${currentPct.toFixed(2)}%;"></div>
      </div>`;
    ganttEl.appendChild(row);
  });
}

// ── Mouse olayları (hover / click) ────────────────────────────────────────────
function initMouseEvents() {
  const el = renderer.domElement;

  el.addEventListener('mousemove', e => {
    const rect = el.getBoundingClientRect();
    mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const threeObjects = meshObjects.map(m => m.three);
    const hits = raycaster.intersectObjects(threeObjects, false);

    const tip  = document.getElementById('hover-tip');
    if (hits.length > 0) {
      const obj    = hits[0].object;
      const meshId = obj.userData.meshId;
      const si     = scheduleMap[meshId];
      const md     = obj.userData.meshDef;

      tip.style.display = 'block';
      tip.style.left    = (e.clientX - el.getBoundingClientRect().left + 14) + 'px';
      tip.style.top     = (e.clientY - el.getBoundingClientRect().top  - 10) + 'px';
      tip.innerHTML     = `<strong>${md.label || md.category || 'Eleman'}</strong>
        ${si ? `<span>📅 ${si.start_date} → ${si.end_date}</span><span>📌 ${si.phase}</span>` : ''}`;

      el.style.cursor = 'pointer';
      if (hoveredMesh !== obj) hoveredMesh = obj;
    } else {
      tip.style.display = 'none';
      el.style.cursor   = 'default';
      hoveredMesh = null;
    }
  });

  el.addEventListener('click', e => {
    raycaster.setFromCamera(mouse, camera);
    const threeObjects = meshObjects.map(m => m.three);
    const hits = raycaster.intersectObjects(threeObjects, false);
    if (hits.length > 0) {
      const meshId = hits[0].object.userData.meshId;
      showSelectedInfo(meshId);
    }
  });
}

function showSelectedInfo(meshId) {
  selectedMeshId = meshId;
  const si = scheduleMap[meshId];
  const md = meshObjects.find(m => m.meshId === meshId)?.three.userData.meshDef;
  const ci = costMap[meshId]?.[0];

  const rows = [];
  if (md) {
    rows.push(['Kategori', md.category]);
    rows.push(['Tip',      md.label]);
  }
  if (si) {
    rows.push(['Başlangıç', si.start_date]);
    rows.push(['Bitiş',    si.end_date]);
    rows.push(['Faz',      si.phase]);
    if (si.wbs_code) rows.push(['WBS', si.wbs_code]);
  }
  if (ci) {
    rows.push(['Poz', ci.poz_no + ' ' + ci.poz_adi]);
    rows.push(['Miktar', (ci.miktar || 0).toFixed(3) + ' ' + ci.birim]);
    rows.push(['Maliyet', fmtCurrency(ci.toplam, dto?.currency || '₺')]);
  }

  if (rows.length === 0) return;

  const tbl = document.getElementById('selected-table');
  const none= document.getElementById('selected-none');
  tbl.innerHTML = rows.map(([k,v]) =>
    `<tr><td>${k}</td><td style="color:#ccc">${v||'—'}</td></tr>`).join('');
  tbl.style.display   = 'table';
  none.style.display  = 'none';
}

// ── Kamera ────────────────────────────────────────────────────────────────────
function fitCamera(bbox) {
  const cx = (bbox.min_x + bbox.max_x) / 2;
  const cy = (bbox.min_y + bbox.max_y) / 2;
  const cz = (bbox.min_z + bbox.max_z) / 2;
  const diag = Math.sqrt(
    Math.pow(bbox.max_x - bbox.min_x, 2) +
    Math.pow(bbox.max_y - bbox.min_y, 2) +
    Math.pow(bbox.max_z - bbox.min_z, 2)) || 8000;

  ctls.target.set(cx, cy, cz);
  const d = diag * 0.9;
  camera.position.set(cx + d * 0.65, cy + d * 0.5, cz + d * 0.65);
  camera.lookAt(cx, cy, cz);
}
function autoFit() {
  const box = new THREE.Box3().setFromObject(previewGroup);
  if (box.isEmpty()) return;
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const diag   = Math.max(size.x, size.y, size.z) || 8000;
  ctls.target.copy(center);
  camera.position.set(
    center.x + diag * 0.8, center.y + diag * 0.6, center.z + diag * 0.8);
  camera.lookAt(center);
}
function resetCamera() {
  if (dto?.bbox) fitCamera(dto.bbox); else autoFit();
}

// ── Orbit Controls state object (target kullanılır attachControls'tan) ─────────
const ctls = { target: new THREE.Vector3() };

// ── Resize ────────────────────────────────────────────────────────────────────
function onResize() {
  const container = document.getElementById('scene-area');
  const W = container.clientWidth;
  const H = container.clientHeight;

}

// ── Yardımcı fonksiyonlar ─────────────────────────────────────────────────────
function parseDate(s) {
  if (!s) return null;
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}
function daysBetween(a, b) {
  return Math.max(0, (b - a) / 86400000);
}
function fmtDate(d) {
  if (!d) return '—';
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
}
function fmtCurrency(v, sym) {
  return (sym || '₺') + (v || 0).toLocaleString('tr-TR', {
    minimumFractionDigits: 0, maximumFractionDigits: 0
  });
}

initScene();
// Orbit controls'ü renderer domElement'e bağla
(function attachControls(el) {
  const STATE = { NONE:-1, ROTATE:0, PAN:1 };
  let state = STATE.NONE;
  let prev  = { x:0, y:0 };

  el.addEventListener('mousedown', e => {
    if (e.button === 0) state = STATE.ROTATE;
    if (e.button === 2) state = STATE.PAN;
    prev = { x: e.clientX, y: e.clientY };
    e.preventDefault();
  });
  el.addEventListener('mouseup',   () => state = STATE.NONE);
  el.addEventListener('mousemove', e => {
    if (state === STATE.NONE) return;
    const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
    prev = { x: e.clientX, y: e.clientY };

    if (state === STATE.ROTATE) {
      const sph = new THREE.Spherical().setFromVector3(
        new THREE.Vector3().copy(camera.position).sub(ctls.target));
      sph.theta -= dx * 0.007;
      sph.phi   -= dy * 0.007;
      sph.phi    = Math.max(0.05, Math.min(Math.PI - 0.05, sph.phi));
      camera.position.copy(ctls.target).add(new THREE.Vector3().setFromSpherical(sph));
      camera.lookAt(ctls.target);
    }
    if (state === STATE.PAN) {
      const dist = camera.position.distanceTo(ctls.target);
      const f    = dist / 1000 * 0.9;
      const right = new THREE.Vector3();
      right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), camera.up).normalize();
      const up = camera.up.clone().normalize();
      const dp = right.multiplyScalar(-dx * f).add(up.multiplyScalar(dy * f));
      ctls.target.add(dp); camera.position.add(dp); camera.lookAt(ctls.target);
    }
  });
  el.addEventListener('wheel', e => {
    const dist = camera.position.distanceTo(ctls.target);
    const nd   = Math.max(10, dist * (1 + e.deltaY * 0.001));
    const dir  = new THREE.Vector3().subVectors(camera.position, ctls.target).normalize();
    camera.position.copy(ctls.target).add(dir.multiplyScalar(nd));
    camera.lookAt(ctls.target);
    e.preventDefault();
  }, { passive: false });
  el.addEventListener('contextmenu', e => e.preventDefault());
})(renderer.domElement);
</script>
